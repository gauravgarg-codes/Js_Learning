<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit and remove DOM</title>
</head>
<body style="background-color: #212121; color: white;">
    <ul class="language">
        <li>javascript</li>
    </ul>
    <script>
        function addLanguage(langName){
           const li = document.createElement("li")
           li.innerHTML=`${langName}`
           document.querySelector(".language").appendChild(li)
        }
        addLanguage("python")
        addLanguage("Typescript")
        // the above one is the very basic approach to get adding new dom to the document. and in this 
        // full tree tranverse krna pad rha hai

        // optimized way to add DOM --> avoids HTML parsing

        function addoptzLanguage(langName){
            const li = document.createElement("li")
            li.appendChild(document.createTextNode(langName))
            document.querySelector(".language").appendChild(li)
        }
        addoptzLanguage("python")

        // EDIT
        // see the concept of nth child

        const secondLang = document.querySelector("li:nth-child(3)")
        secondLang.innerHTML = "GoLang"
         
        // another way to edit 

        const firstLang = document.querySelector("li:nth-child(1)")
        const newli = document.createElement("li")
        newli.textContent = "mojo"
        firstLang.replaceWith(newli)
        
        // one another way to edit
        // only :first-child, :last-child, :only-child this are pseudo-classes :)


        const thirdLang = document.querySelector("li:nth-child(3)")
        thirdLang.outerHTML= "<li> C++ </li>"


        // REMOVE methods

        const lastLang = document.querySelector("li:last-child")
        lastLang.remove()











    </script>
</body>
</html>
